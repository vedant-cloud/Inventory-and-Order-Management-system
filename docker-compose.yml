services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    # Removed the local ./backend volume mount for production parity
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      # Maps local port 5173 to the Nginx port 80 inside the container
      - "5173:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    # Removed local volume mounts so it serves the Nginx build
    depends_on:
      - backend

volumes:
  postgres_data: